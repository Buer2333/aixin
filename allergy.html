<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Allergy Form | Favorite Hibachi Catering</title>
  <meta name="description" content="Let us know about food allergies before your hibachi event so our chefs can prepare safely.">
  <meta property="og:title" content="Allergy Form | Favorite Hibachi Catering">
  <meta property="og:description" content="Report food allergies before your event.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://osakahibachi2door.com/allergy.html">
  <meta property="og:image" content="https://osakahibachi2door.com/images/chef1.jpg">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔥</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :focus-visible { outline: 2px solid #ef4444; outline-offset: 2px; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto flex items-center justify-between px-4 py-3 relative">
      <a href="index.html" class="text-red-600 font-bold text-xl"><span aria-hidden="true">🔥</span> Favorite Hibachi</a>
      <button id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false"
        class="md:hidden text-3xl text-red-600 leading-none px-2 rounded">☰</button>
      <div id="nav-menu"
        class="hidden md:flex flex-col md:flex-row absolute md:static top-full left-0 right-0 bg-white md:bg-transparent shadow-md md:shadow-none border-t md:border-0 md:items-center gap-0 md:gap-5 text-base">
        <a href="index.html" class="px-4 py-3 md:p-0 hover:text-red-500">Home</a>
        <a href="menu.html" class="px-4 py-3 md:p-0 hover:text-red-500">Menu</a>
        <a href="service.html" class="px-4 py-3 md:p-0 hover:text-red-500">Service Area</a>
        <a href="allergy.html" class="px-4 py-3 md:p-0 hover:text-red-500 font-semibold">Allergy Form</a>
        <a href="contact.html" class="px-4 py-3 md:p-0 hover:text-red-500">Contact</a>
        <a href="index.html#book-now" class="mx-4 my-2 md:mx-0 md:my-0 bg-red-500 text-white px-4 py-2 rounded-lg shadow hover:bg-red-600 font-semibold text-center">Book Now</a>
      </div>
    </div>
  </nav>

  <header class="bg-red-500 text-white py-6">
    <div class="container mx-auto text-center">
      <h1 class="text-4xl font-bold">Allergy Form</h1>
      <p class="mt-2 text-lg">Let us know so our chefs can keep everyone safe.</p>
    </div>
  </header>

  <main class="py-16">
    <div class="container mx-auto max-w-lg px-4">
      <form action="https://formspree.io/f/xwpnzgpr" method="POST" class="bg-white shadow-md rounded-lg p-8">
        <input type="hidden" name="_subject" value="Allergy Form Submission">
        <input type="hidden" name="form_type" value="allergy">
        <div class="mb-4 text-left">
          <label class="block text-gray-700 mb-2" for="name">Your Name</label>
          <input type="text" name="name" id="name" required class="w-full border border-gray-300 rounded-lg p-2" />
        </div>
        <div class="mb-4 text-left">
          <label class="block text-gray-700 mb-2" for="contact">Contact Info (Phone/Email)</label>
          <input type="text" name="contact" id="contact" required class="w-full border border-gray-300 rounded-lg p-2" />
        </div>
        <div class="mb-4 text-left">
          <label class="block text-gray-700 mb-2" for="event_date">Event Date</label>
          <input type="date" name="event_date" id="event_date" class="w-full border border-gray-300 rounded-lg p-2" />
        </div>
        <div class="mb-4 text-left">
          <label class="block text-gray-700 mb-2" for="allergy">Food Allergies</label>
          <textarea id="allergy" name="allergy" rows="5" required placeholder="List any allergies (e.g. shellfish, peanuts, soy, gluten)..." class="w-full border border-gray-300 rounded-lg p-2"></textarea>
        </div>
        <button type="submit" class="bg-red-500 text-white px-6 py-2 rounded-lg shadow hover:bg-red-600 transition">Submit</button>
      </form>
    </div>
  </main>

  <footer class="bg-red-500 text-white py-6">
    <div class="container mx-auto text-center">
      <p><span aria-hidden="true">📞</span> <a href="tel:+12674146687" class="hover:underline">(267) 414-6687</a> | <span aria-hidden="true">✉</span> <a href="mailto:osakahibachi2door@gmail.com" class="hover:underline">osakahibachi2door@gmail.com</a></p>
      <p>© 2025 Favorite Hibachi Catering. All rights reserved.</p>
    </div>
  </footer>

  <button id="back-to-top" aria-label="Back to top" class="fixed bottom-6 right-6 hidden bg-red-500 text-white w-12 h-12 rounded-full shadow-lg hover:bg-red-600 z-40 text-2xl leading-none">↑</button>
  <script>
    (function(){
      const btn = document.getElementById('nav-toggle');
      const menu = document.getElementById('nav-menu');
      btn.addEventListener('click', () => {
        const isHidden = menu.classList.toggle('hidden');
        btn.setAttribute('aria-expanded', String(!isHidden));
      });
      menu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
        if (window.innerWidth < 768) menu.classList.add('hidden');
      }));
    })();
    (function(){
      const b = document.getElementById('back-to-top');
      window.addEventListener('scroll', () => {
        b.classList.toggle('hidden', window.scrollY < 400);
      });
      b.addEventListener('click', () => window.scrollTo({top: 0, behavior: 'smooth'}));
    })();
  </script>
</body>
</html>
